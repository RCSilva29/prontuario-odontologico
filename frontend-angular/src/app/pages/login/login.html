<section class="login-page">
  <div class="login-card">
    <img src="/LogoSisOdonto.png" alt="Odonto Pacheco" class="logo">

    <h1>Acesso ao Sistema</h1>
    <p>Entre com seu email e senha</p>

    <p *ngIf="erro" class="erro">{{ erro }}</p>

    <form (ngSubmit)="entrar()">
      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" placeholder="informe seu email">
      </label>

      <label>
        Senha
        <input type="password" name="senha" [(ngModel)]="senha" placeholder="Digite sua senha">
      </label>

      <button type="submit" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</section>
