services:
  postgres:
    image: postgres:16
    container_name: prontuario-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prontuario_odonto
      POSTGRES_USER: prontuario_user
      POSTGRES_PASSWORD: prontuario_pass
    ports:
      - "5432:5432"
    volumes:
      - prontuario_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend-springboot
    container_name: prontuario-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prontuario_odonto
      SPRING_DATASOURCE_USERNAME: prontuario_user
      SPRING_DATASOURCE_PASSWORD: prontuario_pass
      APP_UPLOAD_DIR: /app/anexos/pacientes
    ports:
      - "8080:8080"
    volumes:
      - ./anexos:/app/anexos

  frontend:
    build:
      context: ./frontend-angular
    container_name: prontuario-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  prontuario_postgres_data:
